# Server Configuration
server.port=${PORT:8080}

# Application Name
spring.application.name=stylesphere

# MongoDB Configuration
spring.data.mongodb.uri=${YOUR_MONGODB_URI}
jwt.secret=${JWT_SECRET}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
# CORS Configuration
app.cors.allowedOrigins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# JWT Configuration
app.jwtSecret=${JWT_SECRET:StyleSphereSecretKeyWhichNeedsToBeVeryLongToWorkWithHS512AlgorithmForSecurityPurposes2026!@#}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# Seed Admin Configuration
app.seed.adminFirstName=${ADMIN_FIRST_NAME:Admin}
app.seed.adminLastName=${ADMIN_LAST_NAME:User}
app.seed.adminEmail=${ADMIN_EMAIL:admin@stylesphere.com}
app.seed.adminPassword=${ADMIN_PASSWORD:admin123}
app.seed.adminPhone=${ADMIN_PHONE:9999999999}

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging Configuration
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.com.stylesphere=DEBUG
